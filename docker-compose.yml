version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: agro_postgres
    environment:
      POSTGRES_DB: agro_dev
      POSTGRES_USER: agro_user
      POSTGRES_PASSWORD: agro_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
